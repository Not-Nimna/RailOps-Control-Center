services:
  edge-gateway:
    build: ./edge-gateway
    ports:
      - "9000:9000/udp"
    environment:
      - IOT_ENDPOINT=${IOT_ENDPOINT:-a16j74wv9e0nbe-ats.iot.ca-central-1.amazonaws.com}
      - AWS_REGION=ca-central-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    volumes:
      - ./certs:/edge-gateway/certs:ro
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION=ca-central-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - DYNAMODB_ASSETS_TABLE=railsight-assets
      - DYNAMODB_TELEMETRY_TABLE=railsight-telemetry
      - DYNAMODB_ALERTS_TABLE=railsight-alerts
      - RUNBOOKS_BUCKET=railsight-runbooks-yourname-2026

  simulator:
    build: ./simulator
    command: python simulate_assets.py --assets 30 --failure-rate 0.10 --interval 10
    environment:
      - GATEWAY_HOST=edge-gateway
      - GATEWAY_PORT=9000
    depends_on:
      - edge-gateway

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000/ws
    depends_on:
      - backend
